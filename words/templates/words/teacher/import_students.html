{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>批量导入学生</title>
    <link rel="stylesheet" href="{% static 'words/css/modern.css' %}">
    <style>
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        textarea { width: 100%; height: 300px; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 8px; font-family: monospace; }
        .example { background: #f0f4ff; padding: 1rem; border-radius: 8px; margin: 1rem 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📚 VocabMaster 教师后台</div>
        <div class="nav-links">
            <a href="{% url 'student_management' %}">← 返回</a>
        </div>
    </nav>

    <div class="container">
        <h1>👥 批量导入学生</h1>
        
        <div class="example">
            <strong>输入格式：</strong>每行一个学生，格式为：学号,姓名<br>
            例如：<br>
            01,张三<br>
            02,李四<br>
            03,王五
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>选择班级</label>
                <select name="class_name" required>
                    {% for class in classes %}
                    <option value="{{ class }}">{{ class }}</option>
                    {% endfor %}
                    <option value="六1班">六1班（新建）</option>
                    <option value="六2班">六2班（新建）</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>学生名单</label>
                <textarea name="students_data" placeholder="01,张三&#10;02,李四&#10;03,王五" required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">开始导入</button>
        </form>
    </div>
</body>
</html>
