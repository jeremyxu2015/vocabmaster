{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词管理 - VocabMaster</title>
    <link rel="stylesheet" href="{% static 'words/css/modern.css' %}">
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .glass-table { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); border: 1px solid rgba(255,255,255,0.1); width: 100%; border-collapse: collapse; }
        .glass-table th { background: var(--bg-secondary); padding: 1rem; text-align: left; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; border-bottom: 2px solid var(--bg-secondary); }
        .glass-table td { padding: 1rem; border-bottom: 1px solid var(--bg-secondary); color: var(--text-primary); }
        .glass-table tr:hover { background: rgba(99, 102, 241, 0.05); }
        .glass-table tr:last-child td { border-bottom: none; }
        .word-title-cell { font-weight: 700; color: var(--primary); font-size: 1.1rem; }
        .phonetic-cell { font-family: 'Times New Roman', serif; color: var(--text-secondary); font-size: 0.9rem; }
        .diff-badge { display: inline-block; padding: 0.35rem 0.9rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .diff-1 { background: #d1fae5; color: #065f46; }
        .diff-2 { background: #dbeafe; color: #1e40af; }
        .diff-3 { background: #fef3c7; color: #92400e; }
        .diff-4 { background: #fee2e2; color: #991b1b; }
        .diff-5 { background: #f3e8ff; color: #6b21a8; }
        .btn-icon { padding: 0.5rem 1rem; border-radius: var(--radius-md); text-decoration: none; font-size: 0.875rem; font-weight: 600; margin-right: 0.5rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.25rem; }
        .btn-edit { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .btn-edit:hover { background: #3b82f6; color: white; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .btn-delete:hover { background: #ef4444; color: white; }
        .empty-state { text-align: center; padding: 4rem; color: var(--text-muted); }
        .category-tag { background: var(--bg-secondary); padding: 0.25rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📚 VocabMaster</div>
        <div class="nav-links">
            <a href="{% url 'teacher_dashboard' %}">← 返回后台</a>
            <a href="{% url 'logout' %}" class="btn btn-ghost">退出</a>
        </div>
    </nav>
    <div class="container">
        <div class="page-header fade-in">
            <h1 style="font-size: 1.875rem; font-weight: 700;">📖 单词库管理</h1>
            <a href="{% url 'add_word' %}" class="btn btn-primary">+ 添加新单词</a>
        </div>
        <div class="fade-in" style="overflow-x: auto;">
            <table class="glass-table">
                <thead>
                    <tr>
                        <th>单词</th>
                        <th>音标</th>
                        <th>难度</th>
                        <th>分类</th>
                        <th>添加时间</th>
                        <th style="text-align: right;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for word in words %}
                    <tr>
                        <td class="word-title-cell">{{ word.word }}</td>
                        <td class="phonetic-cell">/{{ word.pronunciation }}/</td>
                        <td><span class="diff-badge diff-{{ word.difficulty }}">Level {{ word.difficulty }}</span></td>
                        <td><span class="category-tag">{{ word.category }}</span></td>
                        <td style="color: var(--text-muted); font-size: 0.875rem;">{{ word.created_at|date:"Y-m-d" }}</td>
                        <td style="text-align: right;">
                            <a href="{% url 'edit_word' word.id %}" class="btn-icon btn-edit">编辑</a>
                            <a href="{% url 'delete_word' word.id %}" class="btn-icon btn-delete" onclick="return confirm('确定要删除这个单词吗？此操作不可恢复。')">删除</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="6" class="empty-state">暂无单词数据，请点击右上角添加</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
