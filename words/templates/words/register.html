<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - VocabMaster</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        h1 { text-align: center; color: #2d3748; margin-bottom: 30px; font-size: 28px; }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-error { background: #fed7d7; color: #c53030; border: 1px solid #fc8181; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #4a5568; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        .role-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .role-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .role-option.active { border-color: #667eea; background: #f0f4ff; color: #667eea; font-weight: 600; }
        .teacher-code { display: none; }
        .teacher-code.show { display: block; }
        .hint { font-size: 12px; color: #718096; margin-top: 5px; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
        .login-link { text-align: center; margin-top: 25px; color: #718096; font-size: 14px; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>🎓 创建新账户</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" action="/register/">
            {% csrf_token %}
            
            <div class="form-group">
                <label>账户类型</label>
                <div class="role-box">
                    <div class="role-option active" onclick="selectRole('student', this)">👨‍🎓 学生</div>
                    <div class="role-option" onclick="selectRole('teacher', this)">👨‍🏫 教师</div>
                </div>
                <input type="hidden" name="role" id="role" value="student">
            </div>

            <div class="form-group teacher-code" id="teacherCode">
                <label>教师注册码</label>
                <input type="text" name="teacher_code" placeholder="输入教师注册码">
                <div class="hint">默认注册码：TEACHER2024</div>
            </div>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required placeholder="请输入用户名">
            </div>

            <div class="form-group">
                <label>电子邮箱</label>
                <input type="email" name="email" placeholder="选填">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请输入密码">
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="password2" required placeholder="再次输入密码">
            </div>

            <button type="submit">立即注册</button>
        </form>

        <div class="login-link">
            已有账户？<a href="/login/">立即登录</a>
        </div>
    </div>

    <script>
        function selectRole(role, element) {
            document.getElementById('role').value = role;
            document.querySelectorAll('.role-option').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            const codeDiv = document.getElementById('teacherCode');
            if (role === 'teacher') { codeDiv.classList.add('show'); } 
            else { codeDiv.classList.remove('show'); }
        }
    </script>
</body>
</html>
