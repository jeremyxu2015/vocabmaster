<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改密码 - VocabMaster</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .form-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        h1 { text-align: center; color: #2d3748; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #4a5568; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; font-size: 14px; }
        .alert { padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-error { background: #fed7d7; color: #c53030; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .hint { background: #f0f4ff; padding: 10px; border-radius: 6px; font-size: 12px; color: #667eea; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="form-box">
        <h1>🔐 修改密码</h1>
        {% if messages %}{% for message in messages %}<div class="alert alert-{{ message.tags }}">{{ message }}</div>{% endfor %}{% endif %}
        <div class="hint"><strong>提示：</strong><br>初始密码是你的学号<br>建议修改为容易记住的新密码</div>
        <form method="post">{% csrf_token %}
            <div class="form-group"><label>旧密码</label><input type="password" name="old_password" required placeholder="请输入现在的密码"></div>
            <div class="form-group"><label>新密码</label><input type="password" name="new_password" required placeholder="至少6位字符"></div>
            <div class="form-group"><label>确认新密码</label><input type="password" name="confirm_password" required placeholder="再次输入新密码"></div>
            <button type="submit">确认修改</button>
        </form>
        <div class="back-link"><a href="{% url 'dashboard' %}">← 返回首页</a></div>
    </div>
</body>
</html>
